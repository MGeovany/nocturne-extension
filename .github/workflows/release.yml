name: Release

# Build and attach the packaged extension zip whenever a v* tag is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build and package
        run: npm run package

      - name: Create release and attach zip
        uses: softprops/action-gh-release@v2
        with:
          files: nocturne-*.zip
          generate_release_notes: true
